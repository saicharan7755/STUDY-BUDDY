[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# SPA fallback + route AI traffic to the secure serverless handler (no API key in the browser).
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api-ai"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

## Example environment settings (do NOT store secrets here in plaintext for production)
[context.production.environment]
  # Set these in Netlify Dashboard → Site settings → Environment → Environment variables
  OPENAI_API_KEY = "SET_IN_NETLIFY_DASHBOARD"
  OPENAI_MODEL = "gpt-3.5-turbo"
  ALLOWED_ORIGINS = "https://yourdomain.com"
